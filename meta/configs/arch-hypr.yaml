---

- link:
    /etc/greetd/config.toml: no-stow-root/etc/greetd/config.toml
    /etc/:
      glob: true
      path: meta/dotfiles/root/etc/*
      relink: true
    ~/.config/:
      glob: true
      path: meta/dotfiles/.config/*
      relink: true
      exclude: [ meta/dotfiles/.config/DankMaterialShell/settings.json.dist ]
    ~/.local/share/fonts/ttf/:
      glob: true
      path: meta/dotfiles/.local/share/fonts/ttf/*
      relink: true

